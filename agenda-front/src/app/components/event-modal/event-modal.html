<!-- Overlay escuro — clique fora fecha -->
<div class="overlay" (click)="close()">
  <div class="modal" (click)="$event.stopPropagation()">

    <div class="modal-header">
      <h3>{{ isEditing() ? 'Editar Evento' : 'Novo Evento' }}</h3>
      <button (click)="close()">✕</button>
    </div>

    <div class="modal-body">
      <label>Título *</label>
      <input type="text" [(ngModel)]="form.title" placeholder="Ex: Reunião" />

      <label>Descrição</label>
      <textarea [(ngModel)]="form.description" placeholder="Opcional"></textarea>

      <label>Início *</label>
      <input type="datetime-local" [(ngModel)]="form.startDateTime" />

      <label>Fim *</label>
      <input type="datetime-local" [(ngModel)]="form.endDateTime" />

      <label>Cor</label>
      <input type="color" [(ngModel)]="form.color" />
    </div>

    <div class="modal-footer">
      @if (isEditing()) {
        <button class="btn-delete" (click)="delete()">Excluir</button>
      }
      <button class="btn-cancel" (click)="close()">Cancelar</button>
      <button class="btn-save"   (click)="save()">Salvar</button>
    </div>

  </div>
</div>
